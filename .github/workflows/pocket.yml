name: Build Super Breakout Core

on:
  push:
    branches: [main, master]
    paths:
      - 'src/fpga/**'
      - 'dist/**'
      - '.github/workflows/pocket.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /usr/local/share/boost /opt/hostedtoolcache
          sudo apt-get clean
          docker system prune -af
          df -h /

      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build Pocket core
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/build" \
            -w /build/src/fpga \
            raetro/quartus:pocket \
            quartus_sh --flow compile ap_core

      - name: Reverse Pocket bitstream
        run: |
          sudo chown -R runner:runner src/fpga/output_files/
          python3 src/fpga/reverse_bitstream.py \
            src/fpga/output_files/ap_core.rbf \
            src/fpga/output_files/bitstream.rbf_r

      - name: Package release tree
        run: |
          mkdir -p release
          cp -R dist/. release/
          cp src/fpga/output_files/bitstream.rbf_r release/Cores/ericlewis.SuperBreakout/bitstream.rbf_r

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ericlewis.SuperBreakout-pocket
          path: release/
          retention-days: 30
